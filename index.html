<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Notepad</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            color: white;
            overflow: hidden;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button,
        label {
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover,
        label:hover {
            transform: scale(1.05);
        }

        .save {
            background: #22c55e;
        }

        .reset {
            background: #ef4444;
        }

        .upload {
            background: #3b82f6;
        }

        textarea {
            flex: 1;
            width: 100%;
            border-radius: 15px;
            border: none;
            padding: 15px;
            font-size: 16px;
            resize: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        input[type="file"] {
            display: none;
        }

        .files {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
        }

        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>📝 Firebase Notepad</h1>

            <div class="buttons">
                <button class="save" onclick="saveText()">Save</button>
                <button class="reset" onclick="resetText()">Reset</button>

                <label class="upload">
                    Upload
                    <input type="file" onchange="uploadFile(event)">
                </label>
            </div>
        </div>

        <textarea id="note" placeholder="Start typing..."></textarea>

        <div class="files" id="fileList"><b>📂 Files</b></div>
    </div>

    <script>
        // 🔥 PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyBRIYlVPWK1lAtzks7KHjSUO2ZrbXtV_xU",
            authDomain: "notepad-2fc8f.firebaseapp.com",
            databaseURL: "https://notepad-2fc8f-default-rtdb.firebaseio.com",
            projectId: "notepad-2fc8f",
            storageBucket: "notepad-2fc8f.firebasestorage.app",
            messagingSenderId: "1090003270444",
            appId: "1:1090003270444:web:0184878b11a1549b428a89"
        };



        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        const note = document.getElementById('note');
        const fileList = document.getElementById('fileList');

        // 🔄 Live sync
        db.collection('notepad').doc('shared').onSnapshot(doc => {
            if (doc.exists) note.value = doc.data().text || '';
        });

        function saveText() {
            db.collection('notepad').doc('shared').set({ text: note.value });
        }

        function resetText() {
            if (confirm('Reset for everyone?')) {
                db.collection('notepad').doc('shared').set({ text: '' });
            }
        }

        async function uploadFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ref = storage.ref('files/' + Date.now() + '_' + file.name);

            await ref.put(file);
            const url = await ref.getDownloadURL();

            await db.collection('files').add({ name: file.name, url });
        }

        db.collection('files').onSnapshot(snapshot => {
            fileList.innerHTML = '<b>📂 Files</b>';

            snapshot.forEach(doc => {
                const file = doc.data();
                const div = document.createElement('div');
                div.className = 'file-item';

                const link = document.createElement('a');
                link.href = file.url;
                link.innerText = file.name;
                link.target = '_blank';

                const dl = document.createElement('a');
                dl.href = file.url;
                dl.innerText = '⬇';
                dl.setAttribute('download', file.name);

                div.appendChild(link);
                div.appendChild(dl);
                fileList.appendChild(div);
            });
        });
    </script>

</body>

</html>
