<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Notepad</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            color: white;
            overflow: hidden;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(20px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button,
        label {
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        button:hover,
        label:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .save {
            background: #22c55e;
            color: black;
        }

        .reset {
            background: #ef4444;
            color: white;
        }

        .upload {
            background: #3b82f6;
        }

        textarea {
            flex: 1;
            width: 100%;
            border-radius: 15px;
            border: none;
            padding: 15px;
            font-size: 16px;
            resize: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input[type="file"] {
            display: none;
        }

        .files {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        a {
            color: #fff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>📝 Cloud Notepad</h1>

            <div class="buttons">
                <button class="save" onclick="saveText()">Save</button>
                <button class="reset" onclick="resetText()">Reset</button>

                <label class="upload">
                    Upload
                    <input type="file" onchange="uploadFile(event)">
                </label>
            </div>
        </div>

        <textarea id="note" placeholder="Start typing... shared live for everyone"></textarea>

        <div class="files" id="fileList">
            <b>📂 Files</b>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mnggofnrxkqlsoxohpe.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Xu9Iy9s1bJWUmS8hdzPlRw_MLQxMucv";

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const note = document.getElementById('note');
        const fileList = document.getElementById('fileList');

        async function loadText() {
            const { data } = await client.from('notes').select('*').eq('id', 1).single();
            if (data) note.value = data.content;
        }

        loadText();

        async function saveText() {
            await client.from('notes').upsert({ id: 1, content: note.value });
        }

        async function resetText() {
            if (confirm('Reset for everyone?')) {
                note.value = '';
                await client.from('notes').upsert({ id: 1, content: '' });
            }
        }

        client.channel('live')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'notes' }, payload => {
                note.value = payload.new.content;
            })
            .subscribe();

        async function uploadFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const fileName = Date.now() + '_' + file.name;

            await client.storage.from('files').upload(fileName, file);

            const { data } = client.storage.from('files').getPublicUrl(fileName);

            await client.from('files').insert({ name: file.name, url: data.publicUrl });

            loadFiles();
        }

        async function loadFiles() {
            const { data } = await client.from('files').select('*');

            fileList.innerHTML = '<b>📂 Files</b>';

            data.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';

                const link = document.createElement('a');
                link.href = file.url;
                link.innerText = file.name;
                link.target = '_blank';

                const download = document.createElement('a');
                download.href = file.url;
                download.innerText = '⬇';
                download.setAttribute('download', file.name);

                div.appendChild(link);
                div.appendChild(download);
                fileList.appendChild(div);
            });
        }

        loadFiles();
    </script>

</body>

</html>
