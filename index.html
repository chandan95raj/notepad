<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <title>📝Notepad</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI';
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            color: white;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        button,
        label {
            border: none;
            padding: 5px 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover,
        label:hover {
            transform: scale(1.05);
        }

        .save {
            background: #22c55e;
            color: #fff;
        }

        .reset {
            background: #ef4444;
            color: #fff;
        }

        .upload {
            background: #3b82f6;
            color: #fff;
        }

        textarea {
            flex: 1;
            width: 100%;
            border-radius: 15px;
            border: none;
            padding: 15px;
            font-size: 16px;
            resize: none;
            background: rgba(255, 255, 255, .15);
            color: white;
            outline: none;
        }

        input[type="file"] {
            display: none;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 14px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }

        .modal.active {
            visibility: visible;
        }

        .modal-box {
            background: white;
            color: #111;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            animation: pop .3s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .modal-buttons button {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .ok {
            background: #22c55e;
            color: white;
        }

        .cancel {
            background: #ef4444;
            color: white;
        }

        #status {
            min-width: 70px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h2>📝Notepad</h2>
            <div class="buttons">
                <span id="status" style="align-self:center;font-size:13px;opacity:.8;"></span>
                <button class="reset" onclick="confirmReset()">♻️ Reset</button>

                <button class="save" onclick="copyText()">📋 Copy</button>

                <label class="upload">
                    ⬆️ FIle
                    <input type="file" accept=".txt,.html,.js,.css,.json,.php" onchange="readFile(event)">
                </label>

            </div>
        </div>

        <textarea id="note" placeholder="Start typing..."></textarea>

    </div>

    <footer>
        ❤️ Designed & Developed by <b>Chandan Raj</b>
    </footer>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <p id="modalText"></p>
            <div class="modal-buttons" id="modalBtns"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRIYlVPWK1lAtzks7KHjSUO2ZrbXtV_xU",
            authDomain: "notepad-2fc8f.firebaseapp.com",
            databaseURL: "https://notepad-2fc8f-default-rtdb.firebaseio.com",
            projectId: "notepad-2fc8f",
            storageBucket: "notepad-2fc8f.firebasestorage.app",
            messagingSenderId: "1090003270444",
            appId: "1:1090003270444:web:0184878b11a1549b428a89"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const note = document.getElementById('note');
        const statusEl = document.getElementById('status');

        let timeout = null;
        let isUpdatingFromFirebase = false;

        // 🔄 Live sync
        db.collection('notepad').doc('shared').onSnapshot(doc => {
            if (doc.exists) {
                isUpdatingFromFirebase = true;
                note.value = doc.data().text || '';
                isUpdatingFromFirebase = false;
                setStatus("Saved ✅");
            }
        });

        // ⚡ Auto Save (debounce)
        function autoSave() {
            if (isUpdatingFromFirebase) return;

            setStatus("Saving... ⏳");

            clearTimeout(timeout);
            timeout = setTimeout(() => {
                db.collection('notepad').doc('shared').set({
                    text: note.value
                }).then(() => {
                    setStatus("Saved ✅");
                });
            }, 600);
        }

        // 👇 Trigger auto-save while typing
        note.addEventListener('input', autoSave);

        // 📂 File upload → load + auto save
        function readFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (event) {
                note.value = event.target.result;

                setStatus("Saving... ⏳");

                db.collection('notepad').doc('shared').set({
                    text: note.value
                }).then(() => {
                    setStatus("Saved ✅");
                });
            };

            reader.readAsText(file);
        }

        // 📋 Copy text
        function copyText() {
            if (!note.value.trim()) return;

            navigator.clipboard.writeText(note.value).then(() => {
                setStatus("Copied ✅");

                setTimeout(() => {
                    setStatus("");
                }, 2000);
            });
        }

        // 🔁 Reset with confirm
        function confirmReset() {
            showConfirm("Reset for everyone?", () => {
                db.collection('notepad').doc('shared').set({ text: '' });
            });
        }

        // 🎨 Confirm Modal
        function showConfirm(msg, yesCallback) {
            const modal = document.getElementById('modal');
            const text = document.getElementById('modalText');
            const btns = document.getElementById('modalBtns');

            text.innerText = msg;
            btns.innerHTML = `
        <button class="ok">Yes</button>
        <button class="cancel" onclick="closeModal()">No</button>
    `;

            btns.querySelector('.ok').onclick = () => {
                yesCallback();
                closeModal();
            };

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // 🔄 Status helper
        function setStatus(msg) {
            statusEl.innerText = msg;
        }
    </script>

</body>

</html>
