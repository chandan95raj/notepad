<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button,
        label.upload {
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .save-btn {
            background: #4ade80;
            color: black;
        }

        .reset-btn {
            background: #f87171;
            color: white;
        }

        .upload {
            background: #60a5fa;
            color: white;
        }

        button:hover,
        label.upload:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .footer {
            margin-top: 5px;
            font-size: 0.75rem;
            opacity: 0.7;
            text-align: right;
        }

        input[type="file"] {
            display: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
        }

        .confirm {
            background: #ef4444;
            color: white;
        }

        .cancel {
            background: #e5e7eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Notepad</h1>
            <div class="buttons">
                <button class="save-btn" onclick="saveNote()">Save</button>
                <label class="upload">
                    Upload File
                    <input type="file" accept=".txt" onchange="uploadFile(event)">
                </label>
                <button class="reset-btn" onclick="openModal()">Reset</button>
            </div>
        </div>

        <textarea id="note" placeholder="Start typing your notes here..."></textarea>

        <div class="footer">Auto-saves in your browser</div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <p>Are you sure you want to reset?</p>
            <div class="modal-buttons">
                <button class="confirm" onclick="resetNote()">Yes</button>
                <button class="cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const note = document.getElementById('note');
        const modal = document.getElementById('modal');

        // Load saved note
        window.onload = () => {
            note.value = localStorage.getItem('note') || '';
        };

        function saveNote() {
            localStorage.setItem('note', note.value);
            alert('Saved successfully!');
        }

        // Auto-save
        note.addEventListener('input', () => {
            localStorage.setItem('note', note.value);
        });

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function resetNote() {
            note.value = '';
            localStorage.removeItem('note');
            closeModal();
        }

        // File Upload
        function uploadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                note.value = e.target.result;
                localStorage.setItem('note', note.value);
            };
            reader.readAsText(file);
        }
    </script>
</body>

</html>
